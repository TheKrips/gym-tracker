<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  <title>Gym Tracker</title>
  <style>
    :root {
      --bg:       #09090b;
      --surface:  #111114;
      --surface2: #18181b;
      --surface3: #27272a;
      --border:   rgba(255,255,255,0.06);
      --border2:  rgba(255,255,255,0.1);
      --primary:  #8b5cf6;
      --primary2: #7c3aed;
      --primary-glow: rgba(139,92,246,0.15);
      --green:    #22c55e;
      --green-glow: rgba(34,197,94,0.12);
      --red:      #ef4444;
      --yellow:   #eab308;
      --text:     #fafafa;
      --text2:    #a1a1aa;
      --text3:    #71717a;
      --radius:   14px;
      --radius-sm: 10px;
      /* Easing from Emil Kowalski */
      --ease-out-quint: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-out-cubic: cubic-bezier(0.215, 0.61, 0.355, 1);
      --ease-in-out-quart: cubic-bezier(0.77, 0, 0.175, 1);
      --border-hairline: 1px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media only screen and (min-device-pixel-ratio: 2), only screen and (min-resolution: 192dpi) {
      :root { --border-hairline: 0.5px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition-duration: 0.01ms !important; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg); height: 100%; }
    body {
      background: var(--bg); color: var(--text); min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      font-size: 16px; -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding-bottom: calc(68px + var(--safe-bottom));
    }
    button, input { touch-action: manipulation; }

    /* ─── Header ──────────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(9,9,11,0.85); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: var(--border-hairline) solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; min-height: 48px;
      transition: transform 300ms var(--ease-out-quint), opacity 300ms var(--ease-out-quint);
    }
    .header.hidden { transform: translateY(-100%); opacity: 0; }
    .header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--surface2); border: var(--border-hairline) solid var(--border2);
      color: var(--text2); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 150ms ease, transform 120ms var(--ease-out-cubic);
    }
    .icon-btn:active { transform: scale(0.92); background: var(--surface3); }

    /* ─── Bottom Nav — Safari-style collapse ──────────────────────── */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(9,9,11,0.88); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: var(--border-hairline) solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      transition: transform 300ms var(--ease-out-quint), opacity 200ms ease;
    }
    .nav.collapsed {
      transform: translateY(calc(100% - 4px));
      opacity: 0.6;
    }
    .nav.collapsed:active, .nav.collapsed:hover { transform: translateY(0); opacity: 1; }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px 6px; cursor: pointer; -webkit-tap-highlight-color: transparent;
      color: var(--text3); font-size: 10px; letter-spacing: 0.02em; gap: 2px;
      border: none; background: none; min-height: 44px;
      transition: color 150ms ease;
    }
    .nav-item.active { color: var(--primary); }
    .nav-item .nav-icon { font-size: 20px; transition: transform 200ms var(--ease-out-cubic); }
    .nav-item:active .nav-icon { transform: scale(0.85); }

    /* ─── Pages with slide transition ─────────────────────────────── */
    .page { display: none; padding: 14px 16px; opacity: 0; }
    .page.active { display: block; animation: pageIn 250ms var(--ease-out-quint) forwards; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── Timer ───────────────────────────────────────────────────── */
    .timer-card {
      background: var(--surface); border: var(--border-hairline) solid var(--border2);
      border-radius: var(--radius); padding: 16px;
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 16px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; user-select: none;
      transition: box-shadow 300ms ease, border-color 300ms ease;
    }
    .timer-card.running { border-color: rgba(139,92,246,0.3); box-shadow: 0 0 20px var(--primary-glow); }
    .timer-card.done { border-color: rgba(34,197,94,0.3); box-shadow: 0 0 20px var(--green-glow); }
    .timer-ring-wrap { position: relative; flex-shrink: 0; }
    .timer-ring { transform: rotate(-90deg); }
    .timer-ring-bg { fill: none; stroke: var(--surface3); stroke-width: 4; }
    .timer-ring-progress { fill: none; stroke: var(--primary); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.3s linear, stroke 0.3s ease; }
    .timer-ring-progress.done { stroke: var(--green); }
    .timer-ring-progress.urgent { stroke: var(--red); }
    .timer-display { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .timer-time { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
    .timer-label { font-size: 9px; color: var(--text3); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.1em; }
    .timer-controls { flex: 1; }
    .timer-default { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
    .timer-adjust { display: flex; gap: 6px; align-items: center; }
    .adj-btn {
      background: var(--surface2); border: var(--border-hairline) solid var(--border2);
      color: var(--text2); border-radius: 8px; padding: 5px 10px;
      font-size: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 100ms ease, transform 100ms var(--ease-out-cubic);
    }
    .adj-btn:active { transform: scale(0.95); background: var(--surface3); }
    .timer-status { font-size: 12px; color: var(--text3); margin-top: 6px; }
    .timer-status.running { color: var(--primary); }
    .timer-status.done { color: var(--green); }

    /* ─── Day grid ────────────────────────────────────────────────── */
    .section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; font-weight: 600; }
    .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .day-card {
      background: var(--surface); border: var(--border-hairline) solid var(--border2);
      border-radius: var(--radius); padding: 14px 12px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform 150ms var(--ease-out-cubic), box-shadow 200ms ease, border-color 200ms ease;
    }
    .day-card:active { transform: scale(0.97); }
    .day-card.today { border-color: rgba(139,92,246,0.35); box-shadow: 0 0 16px var(--primary-glow); }
    .day-card-badge { font-size: 10px; color: var(--text3); margin-bottom: 3px; letter-spacing: 0.02em; }
    .day-card-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; letter-spacing: -0.01em; }
    .day-card-focus { font-size: 11px; color: var(--text3); line-height: 1.4; }
    .today-badge { font-size: 9px; background: var(--primary); color: white; padding: 1px 6px; border-radius: 20px; margin-left: 4px; vertical-align: middle; font-weight: 600; }

    /* ─── Workout ──────────────────────────────────────────────────── */
    .workout-header { margin-bottom: 14px; }
    .workout-title { font-size: 18px; font-weight: 700; margin-bottom: 2px; letter-spacing: -0.02em; }
    .workout-focus { font-size: 12px; color: var(--text3); }
    .progress-bar-wrap { background: var(--surface2); border-radius: 20px; height: 3px; margin-top: 8px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--primary); border-radius: 20px; transition: width 400ms var(--ease-out-quint); }

    /* ─── Exercise card ───────────────────────────────────────────── */
    .exercise-card {
      background: var(--surface); border: var(--border-hairline) solid var(--border2);
      border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    }
    .exercise-header {
      padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .exercise-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--surface2); border: var(--border-hairline) solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--text3); flex-shrink: 0; margin-top: 1px;
    }
    .exercise-info { flex: 1; min-width: 0; }
    .exercise-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; letter-spacing: -0.01em; }
    .exercise-meta { font-size: 12px; color: var(--text3); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .exercise-badge { font-size: 9px; padding: 1px 7px; border-radius: 20px; font-weight: 600; letter-spacing: 0.02em; }
    .badge-compound { background: rgba(139,92,246,0.12); color: var(--primary); }
    .badge-isolation { background: rgba(34,197,94,0.1); color: var(--green); }
    .badge-superset { background: rgba(234,179,8,0.1); color: var(--yellow); }
    .cue-toggle { color: var(--text3); font-size: 16px; flex-shrink: 0; padding: 4px; margin-top: 0; }

    /* ─── Cues ─────────────────────────────────────────────────────── */
    .exercise-cues {
      max-height: 0; overflow: hidden; padding: 0 14px;
      border-top: var(--border-hairline) solid transparent;
      transition: max-height 300ms var(--ease-out-quint), padding 200ms var(--ease-out-cubic);
    }
    .exercise-cues.open { max-height: 500px; padding: 10px 14px 12px; border-top-color: var(--border); }
    .exercise-cues ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 5px; }
    .exercise-cues li { font-size: 12px; color: var(--text3); padding-left: 12px; position: relative; line-height: 1.4; }
    .exercise-cues li::before { content: ''; position: absolute; left: 0; top: 7px; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); }
    .warmup-line { font-size: 11px; color: var(--yellow); margin-bottom: 6px; padding: 5px 8px; background: rgba(234,179,8,0.06); border-radius: 6px; }
    .note-line { font-size: 11px; color: var(--text3); margin-top: 6px; padding: 5px 8px; background: var(--surface2); border-radius: 6px; font-style: italic; }

    /* ─── Set logger ───────────────────────────────────────────────── */
    .sets-section { border-top: var(--border-hairline) solid var(--border); padding: 10px 14px 12px; }
    .sets-label { font-size: 10px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    .set-row {
      display: grid; grid-template-columns: 24px 1fr 1fr 44px; gap: 6px;
      align-items: center; margin-bottom: 5px;
    }
    .set-num {
      width: 24px; height: 24px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--text3);
      transition: background 200ms ease, color 200ms ease;
    }
    .set-num.done { background: var(--green); color: white; }
    .set-input-wrap { display: flex; align-items: center; gap: 3px; }
    .set-input {
      width: 100%; background: var(--surface2); border: var(--border-hairline) solid var(--border2);
      color: var(--text); border-radius: 8px; padding: 9px 4px; font-size: 15px; text-align: center;
      -webkit-appearance: none; font-variant-numeric: tabular-nums;
      transition: border-color 200ms ease;
    }
    .set-input:focus { outline: none; border-color: var(--primary); }
    .set-input.done { border-color: rgba(34,197,94,0.4); }
    .set-unit { font-size: 10px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }
    .set-done-btn {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface2); border: 2px solid var(--surface3);
      color: var(--text3); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 200ms ease, border-color 200ms ease, transform 120ms var(--ease-out-cubic);
    }
    .set-done-btn.done { background: var(--green); border-color: var(--green); color: white; }
    .set-done-btn:active { transform: scale(0.90); }

    .superset-divider { text-align: center; font-size: 10px; color: var(--yellow); padding: 5px 0; border-top: var(--border-hairline) dashed rgba(234,179,8,0.2); margin-top: 4px; letter-spacing: 0.05em; }
    .superset-sub-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; margin-top: 6px; }

    /* ─── Buttons ──────────────────────────────────────────────────── */
    .btn {
      width: 100%; padding: 13px; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; cursor: pointer; border: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 120ms var(--ease-out-cubic), opacity 100ms ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:active { background: var(--primary2); }
    .btn-surface { background: var(--surface2); color: var(--text2); border: var(--border-hairline) solid var(--border2); }
    .btn-danger { background: rgba(239,68,68,0.12); color: var(--red); border: var(--border-hairline) solid rgba(239,68,68,0.2); }

    /* ─── History ──────────────────────────────────────────────────── */
    .session-card {
      background: var(--surface); border: var(--border-hairline) solid var(--border2);
      border-radius: var(--radius); padding: 12px 14px;
      margin-bottom: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform 150ms var(--ease-out-cubic);
    }
    .session-card:active { transform: scale(0.98); }
    .session-date { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
    .session-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; letter-spacing: -0.01em; }
    .session-summary { font-size: 12px; color: var(--text3); }
    .session-detail-exercise { margin-bottom: 12px; }
    .session-detail-name { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
    .session-detail-sets { display: flex; gap: 6px; flex-wrap: wrap; }
    .session-detail-set { background: var(--surface2); border: var(--border-hairline) solid var(--border2); border-radius: 8px; padding: 5px 10px; font-size: 12px; font-variant-numeric: tabular-nums; }

    /* ─── Settings ─────────────────────────────────────────────────── */
    .settings-label { font-size: 12px; color: var(--text3); margin-bottom: 5px; }
    .settings-input {
      width: 100%; background: var(--surface2); border: var(--border-hairline) solid var(--border2);
      color: var(--text); border-radius: var(--radius-sm); padding: 11px 12px; font-size: 14px; margin-bottom: 8px;
      transition: border-color 200ms ease;
    }
    .settings-input:focus { outline: none; border-color: var(--primary); }
    .settings-hint { font-size: 11px; color: var(--text3); line-height: 1.4; margin-bottom: 12px; }
    .settings-hint strong { color: var(--text2); }

    /* ─── Toast ────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--surface2); border: var(--border-hairline) solid var(--border2);
      color: var(--text); padding: 8px 18px; border-radius: 20px;
      font-size: 13px; z-index: 300; opacity: 0; pointer-events: none;
      transition: opacity 200ms var(--ease-out-cubic), transform 200ms var(--ease-out-cubic);
      backdrop-filter: blur(12px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(34,197,94,0.3); }
    .toast.error { border-color: rgba(239,68,68,0.3); }

    /* ─── Misc ─────────────────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 36px 20px; color: var(--text3); }
    .empty-state-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.6; }
    .divider { height: var(--border-hairline); background: var(--border); margin: 14px 0; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px; font-size: 13px;
      color: var(--primary); cursor: pointer; margin-bottom: 10px;
      -webkit-tap-highlight-color: transparent; background: none; border: none; padding: 0;
    }
    .finish-section { margin-top: 16px; padding-top: 14px; border-top: var(--border-hairline) solid var(--border); }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .card-wrap { background: var(--surface); border: var(--border-hairline) solid var(--border2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  </style>
</head>
<body>

<header class="header" id="main-header">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:18px">&#9939;</span>
    <h1 id="header-title">Gym Tracker</h1>
  </div>
  <div style="display:flex;gap:6px">
    <button class="icon-btn" id="back-btn-header" style="display:none" onclick="goBack()" aria-label="Back">&#8592;</button>
    <button class="icon-btn" onclick="showPage('settings')" aria-label="Settings">&#9881;</button>
  </div>
</header>

<div id="toast" class="toast"></div>

<!-- HOME -->
<div id="page-home" class="page active">
  <div id="timer-section"></div>
  <div class="section-title">Програма</div>
  <div class="day-grid" id="day-grid"></div>
  <div class="section-title" style="margin-top:4px">Статистика</div>
  <div class="card-wrap">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:12px;color:var(--text3)">Тренувань</span>
      <span style="font-size:14px;font-weight:700;font-variant-numeric:tabular-nums" id="stat-total">—</span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:12px;color:var(--text3)">Цього тижня</span>
      <span style="font-size:14px;font-weight:700;font-variant-numeric:tabular-nums" id="stat-week">—</span>
    </div>
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:12px;color:var(--text3)">Останнє</span>
      <span style="font-size:12px;color:var(--text3)" id="stat-last">—</span>
    </div>
  </div>
</div>

<!-- WORKOUT -->
<div id="page-workout" class="page">
  <div id="timer-section-workout"></div>
  <button class="back-btn" onclick="goBack()">&#8592; Назад</button>
  <div class="workout-header">
    <div class="workout-title" id="workout-title"></div>
    <div class="workout-focus" id="workout-focus"></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="workout-progress" style="width:0%"></div></div>
  </div>
  <div id="exercises-list"></div>
  <div class="finish-section">
    <button class="btn btn-primary" onclick="finishWorkout()">Завершити тренування</button>
    <button class="btn btn-surface" style="margin-top:6px" onclick="goBack()">Скасувати</button>
  </div>
</div>

<!-- HISTORY -->
<div id="page-history" class="page">
  <div class="section-title">Журнал тренувань</div>
  <div id="history-list"></div>
</div>

<!-- SESSION DETAIL -->
<div id="page-session" class="page">
  <button class="back-btn" onclick="showPage('history')">&#8592; Журнал</button>
  <div id="session-detail"></div>
</div>

<!-- SETTINGS -->
<div id="page-settings" class="page">
  <div class="section-title">GitHub</div>
  <div class="card-wrap">
    <div class="settings-label">Personal Access Token</div>
    <input type="password" class="settings-input" id="s-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    <div class="settings-hint">
      <strong>github.com &rarr; Settings &rarr; Developer settings &rarr; Fine-grained PAT</strong><br>
      Contents: Read &amp; Write &mdash; тільки для gym-tracker
    </div>
    <div class="settings-label">Username</div>
    <input type="text" class="settings-input" id="s-owner" placeholder="TheKrips">
    <div class="settings-label">Repo</div>
    <input type="text" class="settings-input" id="s-repo" placeholder="gym-tracker">
    <button class="btn btn-primary" onclick="saveSettings()">Зберегти</button>
    <button class="btn btn-surface" style="margin-top:6px" onclick="testGitHub()">Перевірити</button>
  </div>
  <div class="section-title">Таймер</div>
  <div class="card-wrap">
    <div class="settings-label">Час відпочинку (сек)</div>
    <input type="number" class="settings-input" id="s-timer" placeholder="90">
    <button class="btn btn-surface" onclick="saveTimerDefault()">Зберегти</button>
  </div>
  <div class="section-title">Дані</div>
  <div class="card-wrap">
    <button class="btn btn-surface" onclick="exportCSV()">Експорт CSV</button>
    <button class="btn btn-surface" style="margin-top:6px" onclick="syncFromGitHub()">Синхронізувати з GitHub</button>
    <div class="divider"></div>
    <button class="btn btn-danger" onclick="clearLocalData()">Очистити локальні дані</button>
  </div>
  <div style="text-align:center;padding:14px;color:var(--text3);font-size:11px">Gym Tracker v2.0</div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav" id="main-nav">
  <button class="nav-item active" data-page="home" onclick="showPage('home')">
    <span class="nav-icon">&#127968;</span><span>Головна</span>
  </button>
  <button class="nav-item" data-page="workout" onclick="resumeOrPickWorkout()">
    <span class="nav-icon">&#128170;</span><span>Тренування</span>
  </button>
  <button class="nav-item" data-page="history" onclick="showPage('history')">
    <span class="nav-icon">&#128202;</span><span>Журнал</span>
  </button>
</nav>

<script>
// ─── State ───────────────────────────────────────────────────────────
let workoutData = null;
let currentSession = null;
let pageHistory = ['home'];
const SWIPE_PAGES = ['home', 'workout', 'history'];
let currentSwipePage = 0;

// ─── Timer (absolute time — survives background) ─────────────────────
let timerDefault = parseInt(localStorage.getItem('gym_timer_default') || '90');
let timerSeconds = timerDefault;
let timerTotal = timerDefault;
let timerEndTime = 0;
let timerInterval = null;
let timerRunning = false;
let timerDone = false;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep(freq = 880, dur = 0.4, vol = 0.4) {
  try {
    const ctx = getAudioCtx(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = freq; gain.gain.value = vol;
    osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    setTimeout(() => { try { osc.stop(); } catch(e){} }, dur * 1000 + 50);
  } catch(e) {}
}
function playDoneSound() {
  playBeep(660, 0.15, 0.3); setTimeout(() => playBeep(880, 0.15, 0.3), 180);
  setTimeout(() => playBeep(1100, 0.4, 0.4), 360);
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
}
function timerTick() {
  const remaining = Math.max(0, Math.ceil((timerEndTime - Date.now()) / 1000));
  timerSeconds = remaining;
  if (remaining <= 0 && timerRunning) {
    clearInterval(timerInterval); timerInterval = null;
    timerRunning = false; timerDone = true; timerSeconds = 0;
    playDoneSound();
  }
  renderTimers();
}
function startTimer(secs) {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  const duration = secs !== undefined ? secs : timerDefault;
  timerSeconds = duration; timerTotal = duration;
  timerEndTime = Date.now() + duration * 1000;
  timerRunning = true; timerDone = false;
  timerInterval = setInterval(timerTick, 250);
  renderTimers();
}
function tapTimer() {
  if (timerRunning) {
    clearInterval(timerInterval); timerInterval = null;
    timerRunning = false; timerDone = false;
    timerSeconds = timerDefault; timerTotal = timerDefault;
  } else { timerDone = false; startTimer(); }
  renderTimers();
}
function adjustTimerDefault(delta) {
  timerDefault = Math.max(30, timerDefault + delta);
  localStorage.setItem('gym_timer_default', timerDefault);
  if (!timerRunning && !timerDone) { timerSeconds = timerDefault; timerTotal = timerDefault; }
  renderTimers();
}
document.addEventListener('visibilitychange', () => { if (!document.hidden && timerRunning) timerTick(); });

function fmtTime(s) { const m = Math.floor(s / 60), sec = s % 60; return `${m}:${sec.toString().padStart(2,'0')}`; }

function timerHTML() {
  const r = 42, circ = 2 * Math.PI * r;
  const fraction = timerTotal > 0 ? timerSeconds / timerTotal : 1;
  const offset = circ * (1 - fraction);
  const urgent = timerSeconds <= 10 && timerRunning;
  const progressClass = timerDone ? 'done' : urgent ? 'urgent' : '';
  const cardClass = timerRunning ? 'running' : timerDone ? 'done' : '';
  const statusText = timerRunning ? 'Tap to cancel' : (timerDone ? 'Done — tap to reset' : 'Tap to start');
  const statusClass = timerRunning ? 'running' : timerDone ? 'done' : '';
  return `
  <div class="timer-card ${cardClass}" onclick="tapTimer()">
    <div class="timer-ring-wrap">
      <svg class="timer-ring" width="84" height="84" viewBox="0 0 100 100">
        <circle class="timer-ring-bg" cx="50" cy="50" r="${r}"/>
        <circle class="timer-ring-progress ${progressClass}" cx="50" cy="50" r="${r}"
          stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
      </svg>
      <div class="timer-display">
        <div class="timer-time">${fmtTime(timerSeconds)}</div>
        <div class="timer-label">${timerRunning ? 'REST' : 'TIMER'}</div>
      </div>
    </div>
    <div class="timer-controls" onclick="event.stopPropagation()">
      <div class="timer-default">Default: ${fmtTime(timerDefault)}</div>
      <div class="timer-adjust">
        <button class="adj-btn" onclick="adjustTimerDefault(-30)">&minus;30s</button>
        <button class="adj-btn" onclick="adjustTimerDefault(30)">+30s</button>
      </div>
      <div class="timer-status ${statusClass}">${statusText}</div>
    </div>
  </div>`;
}
function renderTimers() {
  const t1 = document.getElementById('timer-section');
  const t2 = document.getElementById('timer-section-workout');
  if (t1) t1.innerHTML = timerHTML();
  if (t2) t2.innerHTML = timerHTML();
}

// ─── Settings ────────────────────────────────────────────────────────
function getSetting(key, fallback = '') { return localStorage.getItem('gym_' + key) || fallback; }
function setSetting(key, val) { localStorage.setItem('gym_' + key, val); }
function saveSettings() {
  setSetting('github_token', document.getElementById('s-token').value.trim());
  setSetting('github_owner', document.getElementById('s-owner').value.trim() || 'TheKrips');
  setSetting('github_repo', document.getElementById('s-repo').value.trim() || 'gym-tracker');
  showToast('Збережено', 'success');
}
function saveTimerDefault() {
  const v = parseInt(document.getElementById('s-timer').value);
  if (v > 0) { timerDefault = v; localStorage.setItem('gym_timer_default', v); showToast('Збережено', 'success'); renderTimers(); }
}
function loadSettingsPage() {
  document.getElementById('s-token').value = getSetting('github_token');
  document.getElementById('s-owner').value = getSetting('github_owner', 'TheKrips');
  document.getElementById('s-repo').value = getSetting('github_repo', 'gym-tracker');
  document.getElementById('s-timer').value = timerDefault;
}
async function testGitHub() {
  const token = getSetting('github_token'), owner = getSetting('github_owner', 'TheKrips'), repo = getSetting('github_repo', 'gym-tracker');
  if (!token) { showToast('Введи токен', 'error'); return; }
  try { const r = await fetch(`https://api.github.com/repos/${owner}/${repo}`, { headers: { 'Authorization': `token ${token}` } });
    r.ok ? showToast('OK', 'success') : showToast('Помилка: ' + r.status, 'error');
  } catch(e) { showToast('Помилка', 'error'); }
}

// ─── GitHub API ──────────────────────────────────────────────────────
async function fetchWorkoutJson() {
  const owner = getSetting('github_owner', 'TheKrips'), repo = getSetting('github_repo', 'gym-tracker');
  try { const r = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/main/workout.json?t=${Date.now()}`);
    if (!r.ok) throw new Error(r.status); return await r.json();
  } catch(e) { const c = localStorage.getItem('gym_workout_cache'); if (c) return JSON.parse(c); throw e; }
}
async function fetchLogsFromGitHub() {
  const owner = getSetting('github_owner', 'TheKrips'), repo = getSetting('github_repo', 'gym-tracker');
  try { const r = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/main/logs.json?t=${Date.now()}`);
    if (!r.ok) return null; return await r.json();
  } catch(e) { return null; }
}
async function pushLogsToGitHub(logsData) {
  const token = getSetting('github_token'); if (!token) return false;
  const owner = getSetting('github_owner', 'TheKrips'), repo = getSetting('github_repo', 'gym-tracker');
  try {
    const infoRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/logs.json`, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
    if (!infoRes.ok) return false; const info = await infoRes.json();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(logsData, null, 2))));
    const putRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/logs.json`, {
      method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: `log: session ${new Date().toISOString().split('T')[0]}`, content, sha: info.sha })
    }); return putRes.ok;
  } catch(e) { return false; }
}

// ─── Local Logs ──────────────────────────────────────────────────────
function getLocalLogs() { try { return JSON.parse(localStorage.getItem('gym_logs') || '{"sessions":[]}'); } catch(e) { return { sessions: [] }; } }
function saveLocalLogs(logs) { localStorage.setItem('gym_logs', JSON.stringify(logs)); }
function addSession(session) {
  const logs = getLocalLogs();
  logs.sessions = logs.sessions.filter(s => !(s.date === session.date && s.workout_id === session.workout_id));
  logs.sessions.push(session); logs.sessions.sort((a, b) => b.date.localeCompare(a.date));
  saveLocalLogs(logs); return logs;
}
async function syncFromGitHub() {
  showToast('Синхронізація\u2026', '');
  const remote = await fetchLogsFromGitHub();
  if (!remote) { showToast('Не вдалося', 'error'); return; }
  const local = getLocalLogs();
  const remoteKeys = new Set(remote.sessions.map(s => s.date + '_' + s.workout_id));
  for (const s of local.sessions) { if (!remoteKeys.has(s.date + '_' + s.workout_id)) remote.sessions.push(s); }
  remote.sessions.sort((a, b) => b.date.localeCompare(a.date));
  saveLocalLogs(remote); showToast('Синхронізовано', 'success'); renderStats();
}

// ─── Pages ───────────────────────────────────────────────────────────
function showPage(name, pushHistory = true) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === name));
  const page = document.getElementById('page-' + name);
  if (page) page.classList.add('active');
  const titleMap = { home: 'Gym Tracker', workout: '', history: 'Журнал', settings: 'Налаштування', session: 'Деталі' };
  document.getElementById('header-title').textContent = titleMap[name] || 'Gym Tracker';
  document.getElementById('back-btn-header').style.display = ['workout','session'].includes(name) ? 'flex' : 'none';
  if (pushHistory && pageHistory[pageHistory.length-1] !== name) pageHistory.push(name);
  if (name === 'settings') loadSettingsPage();
  if (name === 'history') renderHistory();
  if (name === 'home') { renderDayGrid(); renderStats(); }
  // Update swipe index
  const idx = SWIPE_PAGES.indexOf(name);
  if (idx >= 0) currentSwipePage = idx;
  window.scrollTo({ top: 0 });
}
function goBack() { if (pageHistory.length > 1) { pageHistory.pop(); showPage(pageHistory[pageHistory.length-1], false); } else showPage('home'); }
function resumeOrPickWorkout() { if (currentSession) showPage('workout'); else showPage('home'); }

// ─── Home ────────────────────────────────────────────────────────────
function getDayId() { const map = { 1: 'upper_a', 3: 'lower_a', 4: 'upper_b', 5: 'lower_b' }; return map[new Date().getDay()] || null; }
function renderDayGrid() {
  const grid = document.getElementById('day-grid');
  if (!workoutData) { grid.innerHTML = '<p style="font-size:13px;color:var(--text3)">Завантаження\u2026</p>'; return; }
  const todayId = getDayId();
  grid.innerHTML = workoutData.workouts.map(w => `
    <div class="day-card ${w.id === todayId ? 'today' : ''}" onclick="startWorkout('${w.id}')">
      <div class="day-card-badge">${w.day}${w.id === todayId ? '<span class="today-badge">Сьогодні</span>' : ''}</div>
      <div class="day-card-name">${w.name}</div>
      <div class="day-card-focus">${w.focus}</div>
    </div>`).join('');
}
function renderStats() {
  const logs = getLocalLogs(), sessions = logs.sessions || [];
  document.getElementById('stat-total').textContent = sessions.length;
  const now = new Date(), weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
  document.getElementById('stat-week').textContent = sessions.filter(s => new Date(s.date) >= weekStart).length;
  if (sessions.length > 0) { const l = sessions[0]; document.getElementById('stat-last').textContent = `${l.workout_name} \u2014 ${l.date}`; }
}

// ─── Workout ─────────────────────────────────────────────────────────
function startWorkout(workoutId) {
  if (!workoutData) return;
  const workout = workoutData.workouts.find(w => w.id === workoutId); if (!workout) return;
  currentSession = { date: new Date().toISOString().split('T')[0], workout_id: workoutId, workout_name: workout.name, exercises: [] };
  document.getElementById('workout-title').textContent = `${workout.name} \u2014 ${workout.day}`;
  document.getElementById('workout-focus').textContent = workout.focus;
  renderExercises(workout); showPage('workout');
}
function renderExercises(workout) {
  let html = '', exNum = 0;
  for (const ex of workout.exercises) { exNum++; html += ex.type === 'superset' ? renderSupersetCard(ex, exNum) : renderExerciseCard(ex, exNum); }
  document.getElementById('exercises-list').innerHTML = html;
  updateProgress(workout);
}
function badgeClass(t) { return t === 'compound' ? 'badge-compound' : t === 'isolation' ? 'badge-isolation' : 'badge-superset'; }
function badgeLabel(t) { return t === 'compound' ? 'Базова' : t === 'isolation' ? 'Ізоляція' : 'Суперсет'; }

function renderExerciseCard(ex, num) {
  const p = ex.weight_kg > 0 ? `${ex.sets}\u00d7${ex.reps} @ ${ex.weight_kg}кг` : `${ex.sets}\u00d7${ex.reps}`;
  const rest = ex.rest_sec ? fmtTime(ex.rest_sec) : '';
  let sets = '';
  for (let i = 1; i <= ex.sets; i++) sets += setRowHTML(ex.id, i, ex.weight_kg, ex.reps, ex.rest_sec);
  return `<div class="exercise-card" id="card-${ex.id}">
    <div class="exercise-header" onclick="toggleCues('${ex.id}')">
      <div class="exercise-num">${num}</div>
      <div class="exercise-info">
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-meta"><span class="exercise-badge ${badgeClass(ex.type)}">${badgeLabel(ex.type)}</span><span>${p}</span>${rest ? `<span style="color:var(--primary)">&#9201; ${rest}</span>` : ''}</div>
      </div>
      <div class="cue-toggle">&#128161;</div>
    </div>
    <div class="exercise-cues" id="cues-${ex.id}">
      ${ex.warmup ? `<div class="warmup-line">&#128293; ${ex.warmup}</div>` : ''}
      <ul>${ex.cues.map(c => `<li>${c}</li>`).join('')}</ul>
      ${ex.note ? `<div class="note-line">${ex.note}</div>` : ''}
    </div>
    <div class="sets-section" id="sets-${ex.id}"><div class="sets-label">Підходи</div>${sets}</div>
  </div>`;
}
function renderSupersetCard(ex, num) {
  let html = `<div class="exercise-card" id="card-${ex.id}">
    <div class="exercise-header" onclick="toggleCues('${ex.id}')">
      <div class="exercise-num">${num}</div>
      <div class="exercise-info">
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-meta"><span class="exercise-badge ${badgeClass('superset')}">${badgeLabel('superset')}</span><span style="color:var(--primary)">&#9201; ${fmtTime(ex.rest_sec)}</span></div>
      </div><div class="cue-toggle">&#128161;</div>
    </div>
    <div class="exercise-cues" id="cues-${ex.id}">${ex.note ? `<div class="note-line">${ex.note}</div>` : ''}</div>
    <div class="sets-section" id="sets-${ex.id}">`;
  for (let si = 0; si < ex.exercises.length; si++) {
    const sub = ex.exercises[si];
    if (si > 0) html += `<div class="superset-divider">&#8597; Суперсет</div>`;
    const sp = sub.weight_kg > 0 ? `${sub.sets}\u00d7${sub.reps} @ ${sub.weight_kg}кг` : `${sub.sets}\u00d7${sub.reps}`;
    html += `<div class="superset-sub-name">${sub.name} <span style="color:var(--text3);font-size:11px;font-weight:400">${sp}</span></div>`;
    for (let i = 1; i <= sub.sets; i++) html += setRowHTML(sub.id, i, sub.weight_kg, sub.reps, ex.rest_sec);
  }
  return html + '</div></div>';
}
function setRowHTML(exId, setNum, dw, dr, rest) {
  const w = dw > 0 ? dw : '';
  return `<div class="set-row" id="setrow-${exId}-${setNum}">
    <div class="set-num" id="setnum-${exId}-${setNum}">${setNum}</div>
    <div class="set-input-wrap"><input type="number" class="set-input" id="w-${exId}-${setNum}" value="${w}" placeholder="кг" step="0.5" min="0" inputmode="decimal"><span class="set-unit">кг</span></div>
    <div class="set-input-wrap"><input type="number" class="set-input" id="r-${exId}-${setNum}" value="${dr||''}" placeholder="rep" min="1" inputmode="numeric"><span class="set-unit">rep</span></div>
    <button class="set-done-btn" id="done-${exId}-${setNum}" onclick="markSet('${exId}',${setNum},${rest||90})" aria-label="Done">&#10003;</button>
  </div>`;
}
function toggleCues(exId) { document.getElementById('cues-' + exId)?.classList.toggle('open'); }

function markSet(exId, setNum, restSec) {
  const wEl = document.getElementById(`w-${exId}-${setNum}`), rEl = document.getElementById(`r-${exId}-${setNum}`);
  const doneBtn = document.getElementById(`done-${exId}-${setNum}`), numBadge = document.getElementById(`setnum-${exId}-${setNum}`);
  const isDone = doneBtn.classList.contains('done');
  if (isDone) {
    doneBtn.classList.remove('done'); numBadge.classList.remove('done'); wEl.classList.remove('done'); rEl.classList.remove('done');
    removeSetFromSession(exId, setNum);
  } else {
    doneBtn.classList.add('done'); numBadge.classList.add('done'); wEl.classList.add('done'); rEl.classList.add('done');
    addSetToSession(exId, setNum, parseFloat(wEl.value) || 0, parseInt(rEl.value) || 0);
    startTimer(restSec);
  }
  updateProgressFromDOM();
}
function addSetToSession(exId, setNum, weight, reps) {
  if (!currentSession) return;
  let exEntry = currentSession.exercises.find(e => e.exercise_id === exId);
  if (!exEntry) { exEntry = { exercise_id: exId, sets: [] }; currentSession.exercises.push(exEntry); }
  const existing = exEntry.sets.find(s => s.set === setNum);
  if (existing) { existing.weight = weight; existing.reps = reps; } else exEntry.sets.push({ set: setNum, weight, reps });
}
function removeSetFromSession(exId, setNum) { if (!currentSession) return; const e = currentSession.exercises.find(e => e.exercise_id === exId); if (e) e.sets = e.sets.filter(s => s.set !== setNum); }
function updateProgressFromDOM() { if (!workoutData || !currentSession) return; const w = workoutData.workouts.find(w => w.id === currentSession.workout_id); if (w) updateProgress(w); }
function updateProgress(workout) {
  let total = 0, done = 0;
  for (const ex of workout.exercises) {
    if (ex.type === 'superset') { for (const sub of ex.exercises) { total += sub.sets; done += document.querySelectorAll(`[id^="done-${sub.id}-"].done`).length; } }
    else { total += ex.sets; done += document.querySelectorAll(`[id^="done-${ex.id}-"].done`).length; }
  }
  const bar = document.getElementById('workout-progress');
  if (bar) bar.style.width = (total > 0 ? Math.round(done / total * 100) : 0) + '%';
}
async function finishWorkout() {
  if (!currentSession) return;
  if (currentSession.exercises.length === 0) { showToast('Спочатку залогуй підхід', 'error'); return; }
  currentSession.finished_at = new Date().toISOString();
  const logs = addSession(currentSession);
  showToast('Збережено\u2026', '');
  const ok = await pushLogsToGitHub(logs);
  showToast(ok ? 'GitHub OK' : 'Збережено локально', ok ? 'success' : '');
  currentSession = null;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerRunning = false; timerSeconds = timerDefault; timerTotal = timerDefault;
  renderTimers(); showPage('home');
}

// ─── History ─────────────────────────────────────────────────────────
function renderHistory() {
  const sessions = getLocalLogs().sessions || [];
  const list = document.getElementById('history-list');
  if (!sessions.length) { list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">&#128203;</div><div>Тренувань ще немає</div></div>`; return; }
  list.innerHTML = sessions.map((s, i) => {
    const exC = s.exercises ? s.exercises.length : 0;
    const setC = s.exercises ? s.exercises.reduce((a, e) => a + (e.sets ? e.sets.length : 0), 0) : 0;
    return `<div class="session-card" onclick="showSessionDetail(${i})"><div class="session-date">${formatDate(s.date)}</div><div class="session-name">${s.workout_name || s.workout_id}</div><div class="session-summary">${exC} вправ \u00b7 ${setC} підходів</div></div>`;
  }).join('');
}
function showSessionDetail(index) {
  const session = getLocalLogs().sessions[index]; if (!session) return;
  let html = `<div style="margin-bottom:14px"><div style="font-size:12px;color:var(--text3);margin-bottom:3px">${formatDate(session.date)}</div><div style="font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px">${session.workout_name || session.workout_id}</div></div>`;
  if (!session.exercises?.length) { html += '<p style="color:var(--text3);font-size:13px">Нема даних</p>'; }
  else for (const ex of session.exercises) {
    let exName = ex.exercise_id;
    if (workoutData) for (const w of workoutData.workouts) for (const e of w.exercises) {
      if (e.id === ex.exercise_id) { exName = e.name; break; }
      if (e.type === 'superset') for (const se of e.exercises) if (se.id === ex.exercise_id) { exName = se.name; break; }
    }
    const setsHtml = (ex.sets || []).map(s => `<div class="session-detail-set">${s.set}. ${s.weight > 0 ? s.weight + '\u043a\u0433' : '\u2014'} \u00d7 ${s.reps}</div>`).join('');
    html += `<div class="session-detail-exercise"><div class="session-detail-name">${exName}</div><div class="session-detail-sets">${setsHtml || '<span style="color:var(--text3);font-size:12px">\u2014</span>'}</div></div>`;
  }
  if (session.notes) html += `<div style="font-size:12px;color:var(--text3);margin-top:10px;padding:8px 10px;background:var(--surface2);border-radius:8px;font-style:italic">${session.notes}</div>`;
  document.getElementById('session-detail').innerHTML = html;
  showPage('session');
}
function formatDate(d) { try { return new Date(d + 'T12:00:00').toLocaleDateString('uk-UA', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }); } catch(e) { return d; } }

// ─── Export ──────────────────────────────────────────────────────────
function exportCSV() {
  const sessions = getLocalLogs().sessions || [];
  let csv = 'date,workout_id,workout_name,exercise_id,exercise_name,set,weight_kg,reps\n';
  for (const s of sessions) for (const ex of (s.exercises || [])) {
    let exName = ex.exercise_id;
    if (workoutData) for (const w of workoutData.workouts) for (const e of w.exercises) {
      if (e.id === ex.exercise_id) { exName = e.name; break; }
      if (e.type === 'superset') for (const se of e.exercises) if (se.id === ex.exercise_id) { exName = se.name; break; }
    }
    for (const set of (ex.sets || [])) csv += `${s.date},${s.workout_id},"${s.workout_name||''}","${ex.exercise_id}","${exName}",${set.set},${set.weight},${set.reps}\n`;
  }
  const blob = new Blob([csv], { type: 'text/csv' }), url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `gym-${new Date().toISOString().split('T')[0]}.csv`; a.click(); URL.revokeObjectURL(url);
  showToast('Готово', 'success');
}
function clearLocalData() { if (!confirm('Видалити всі локальні тренування?')) return; localStorage.removeItem('gym_logs'); renderStats(); showToast('Очищено', ''); }

// ─── Toast ───────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast'); el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── Swipe Navigation ───────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, swiping = false;
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX; touchStartY = t.clientY; swiping = true;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!swiping) return; swiping = false;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
  if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.7) return; // not a horizontal swipe
  // Don't swipe if on settings or session detail
  const currentPage = pageHistory[pageHistory.length - 1];
  if (currentPage === 'settings' || currentPage === 'session') return;
  const idx = SWIPE_PAGES.indexOf(currentPage);
  if (idx < 0) return;
  if (dx < 0) { // swipe left → next
    const next = (idx + 1) % SWIPE_PAGES.length;
    if (SWIPE_PAGES[next] === 'workout' && !currentSession) return; // skip workout if no session
    showPage(SWIPE_PAGES[next]);
  } else { // swipe right → prev
    const prev = (idx - 1 + SWIPE_PAGES.length) % SWIPE_PAGES.length;
    if (SWIPE_PAGES[prev] === 'workout' && !currentSession) return;
    showPage(SWIPE_PAGES[prev]);
  }
}, { passive: true });

// ─── Scroll: hide header + collapse nav ──────────────────────────────
let lastScrollY = 0, headerHidden = false, navCollapsed = false;
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  const header = document.getElementById('main-header');
  const nav = document.getElementById('main-nav');
  if (y > lastScrollY && y > 50) {
    if (!headerHidden) { header.classList.add('hidden'); headerHidden = true; }
    if (!navCollapsed) { nav.classList.add('collapsed'); navCollapsed = true; }
  } else if (y < lastScrollY) {
    if (headerHidden) { header.classList.remove('hidden'); headerHidden = false; }
    if (navCollapsed) { nav.classList.remove('collapsed'); navCollapsed = false; }
  }
  lastScrollY = y;
}, { passive: true });

// ─── Init ────────────────────────────────────────────────────────────
async function init() {
  // One-time PAT setup via URL hash
  const hash = window.location.hash;
  if (hash.includes('token=')) {
    const match = hash.match(/token=([^&]+)/);
    if (match) { setSetting('github_token', match[1]); setSetting('github_owner', 'TheKrips'); setSetting('github_repo', 'gym-tracker');
      history.replaceState(null, '', window.location.pathname); showToast('GitHub OK', 'success'); }
  }
  renderTimers(); renderDayGrid(); renderStats();
  try { workoutData = await fetchWorkoutJson(); localStorage.setItem('gym_workout_cache', JSON.stringify(workoutData)); renderDayGrid(); } catch(e) { showToast('Помилка завантаження', 'error'); }
  const localLogs = getLocalLogs();
  if (localLogs.sessions.length === 0) {
    const remote = await fetchLogsFromGitHub();
    if (remote?.sessions?.length > 0) { saveLocalLogs(remote); renderStats(); showToast('Журнал завантажено', 'success'); }
  }
}
init();
</script>
